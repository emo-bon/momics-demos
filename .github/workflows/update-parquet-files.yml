name: Update MetaGOflow Parquet Files

on:
  schedule:
    # Run every Monday at 2:00 AM UTC
    - cron: '0 2 * * 1'
  
  # Allow manual triggering from GitHub UI
  workflow_dispatch:

jobs:
  update-parquet-files:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6 hours max (GitHub Actions limit)
    
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Check available disk space
        run: |
          echo "Disk space before processing:"
          df -h
          echo ""
          echo "Available space: $(df -h . | awk 'NR==2 {print $4}')"
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install pandas pyarrow requests
      
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: Run data aggregation script
        env:
          PYTHONUNBUFFERED: 1
        run: |
          python scripts/combine_mgf_results.py
      
      - name: Cleanup temporary files
        if: always()
        run: |
          echo "Cleaning up cloned repositories..."
          rm -rf tmp/analysis-results-cluster-*
          echo "Disk space after cleanup:"
          df -h
      
      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet data/emo-bon_data/*.parquet 2>/dev/null; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes detected in parquet files"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Changes detected in parquet files"
          fi
      
      - name: Get changed files
        if: steps.check_changes.outputs.changed == 'true'
        id: file_list
        run: |
          FILES=$(git diff --name-only data/emo-bon_data/*.parquet 2>/dev/null | tr '\n' ', ' || echo "No files")
          echo "files=$FILES" >> $GITHUB_OUTPUT
      
      - name: Create Pull Request
        if: steps.check_changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update MetaGOflow parquet files"
          branch: automated/update-parquet-files
          delete-branch: true
          title: "🔄 Update MetaGOflow Parquet Files"
          body: |
            ## Automated Parquet Files Update
            
            This PR was automatically generated by the scheduled workflow.
            
            ### Changes
            - Updated LSU and SSU taxonomy parquet files
            - Data aggregated from EMO-BON analysis results
            
            ### Files Modified
            ```
            ${{ steps.file_list.outputs.files }}
            ```
            
            ### Workflow Details
            - **Triggered by:** ${{ github.event_name }}
            - **Run ID:** ${{ github.run_id }}
            - **Workflow:** [View run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
            
            ---
            
            Please review the changes and merge if everything looks good.
          labels: |
            automated
            data-update
          assignees: ${{ github.repository_owner }}
      
      - name: Create job summary
        if: always()
        run: |
          echo "## MetaGOflow Parquet Files Update" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Run time:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ steps.check_changes.outputs.changed }}" == "true" ]; then
            echo "✅ Pull request created with updated parquet files" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Generated Files" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            ls -lh data/emo-bon_data/*.parquet 2>/dev/null || echo "No parquet files found"
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "ℹ️ No changes detected - files are up to date" >> $GITHUB_STEP_SUMMARY
          fi
